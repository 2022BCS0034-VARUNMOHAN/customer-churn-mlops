apiVersion: apps/v1
kind: Deployment
metadata:
  name: churn-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: churn
  template:
    metadata:
      labels:
        app: churn
    spec:
      containers:
        - name: churn
          image: varuna10/churn-ml
          ports:
            - containerPort: 8000
